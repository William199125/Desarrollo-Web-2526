<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - La Estación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="dashboard-container d-flex">
        <nav class="sidebar bg-white border-end vh-100" style="width: 260px; position: fixed;">
            <div class="p-4 border-bottom text-center">
                <h4 class="m-0 text-warning fw-bold"><i class="bi bi-gift"></i> La Estación</h4>
            </div>
            <div class="list-group list-group-flush mt-3">
                <a href="{{ url_for('panel') }}" class="list-group-item list-group-item-action active border-0"><i class="bi bi-speedometer2 me-2"></i> Panel Principal</a>
                <a href="{{ url_for('listar_productos') }}" class="list-group-item list-group-item-action border-0"><i class="bi bi-box-seam me-2"></i> Inventario</a>
                <a href="{{ url_for('registro_usuario') }}" class="list-group-item list-group-item-action border-0"><i class="bi bi-person-plus me-2"></i> Usuarios</a>
                <a href="{{ url_for('generar_reporte') }}" class="list-group-item list-group-item-action border-0"><i class="bi bi-file-pdf me-2"></i> Reportes PDF</a>
                <a href="{{ url_for('logout') }}" class="list-group-item list-group-item-action text-danger mt-5 border-0"><i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión</a>
            </div>
        </nav>

        <main class="flex-grow-1 bg-light" style="margin-left: 260px;">
            <div class="p-4 bg-white border-bottom d-flex justify-content-between align-items-center">
                <h5 class="m-0 text-muted">Gestión de Detalles</h5>
                <span class="fw-bold"><i class="bi bi-person-circle"></i> {{ current_user.nombre }}</span>
            </div>

            <div class="p-5">
                <h2 class="mb-4">Resumen del Negocio</h2>
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title text-warning"><i class="bi bi-bar-chart-fill"></i> Niveles de Stock</h5>
                        <div style="height: 350px;">
                            <canvas id="graficoStock" data-labels='{{ labels|tojson }}' data-values='{{ values|tojson }}'></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const canvas = document.getElementById('graficoStock');
        // Parseamos los datos limpios sin errores de sintaxis
        const labels = JSON.parse(canvas.dataset.labels);
        const values = JSON.parse(canvas.dataset.values);

        new Chart(canvas, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Unidades Disponibles',
                    data: values,
                    backgroundColor: '#A67C00',
                    borderRadius: 5
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
