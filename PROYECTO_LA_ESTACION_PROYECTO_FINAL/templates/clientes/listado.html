<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clientes - La Estación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light p-4">
    <div class="container bg-white shadow rounded p-4">
        <div class="d-flex justify-content-between mb-4">
            <h2 class="fw-bold text-primary">Directorio de Clientes</h2>
            <div>
                <button class="btn btn-warning fw-bold text-white" data-bs-toggle="modal" data-bs-target="#newC">+ Nuevo</button>
                <a href="{{ url_for('panel') }}" class="btn btn-secondary fw-bold">Panel</a>
            </div>
        </div>

        <table class="table table-hover">
            <thead class="table-dark">
                <tr><th>Nombre</th><th>Cédula</th><th>Teléfono</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                {% for c in clientes %}
                <tr>
                    <td>{{ c.nombre }}</td>
                    <td>{{ c.cedula }}</td>
                    <td>{{ c.telefono }}</td>
                    <td>
                        <a href="{{ url_for('editar_cliente', id=c.id_cliente) }}" class="btn btn-sm btn-outline-primary">Editar</a>
                        <form action="{{ url_for('eliminar_cliente', id=c.id_cliente) }}" method="POST" class="d-inline">
                            <button class="btn btn-sm btn-outline-danger">Eliminar</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="newC" tabindex="-1">
        <div class="modal-dialog">
            <form action="{{ url_for('crear_cliente') }}" method="POST" class="modal-content">
                <div class="modal-header bg-primary text-white"><h5 class="modal-title">Nuevo Cliente</h5></div>
                <div class="modal-body">
                    <input type="text" name="nombre" class="form-control mb-2" placeholder="Nombre" required>
                    <input type="text" name="cedula" class="form-control mb-2" placeholder="Cédula" required>
                    <input type="email" name="correo" class="form-control mb-2" placeholder="Correo">
                    <input type="text" name="telefono" class="form-control" placeholder="Teléfono">
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary w-100">Guardar</button></div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
