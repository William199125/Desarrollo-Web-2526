<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white shadow rounded p-4" style="max-width: 500px;">
        <h2 class="text-center text-primary fw-bold mb-4">Editar Cliente</h2>
        <form action="{{ url_for('editar_cliente', id=cliente.id_cliente) }}" method="POST">
            <input type="text" name="nombre" class="form-control mb-3" value="{{ cliente.nombre }}">
            <input type="text" name="cedula" class="form-control mb-3" value="{{ cliente.cedula }}">
            <input type="email" name="correo" class="form-control mb-3" value="{{ cliente.correo }}">
            <input type="text" name="telefono" class="form-control mb-4" value="{{ cliente.telefono }}">
            <button type="submit" class="btn btn-primary w-100 fw-bold">Guardar Cambios</button>
            <a href="{{ url_for('listar_clientes') }}" class="btn btn-link w-100 text-decoration-none">Cancelar</a>
        </form>
    </div>
</body>
</html>
