<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Estación de los Detalles - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8F9FB; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;}
        /* Login Split Screen similar al ejemplo */
        .login-wrapper { display: flex; width: 900px; height: 500px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .login-form-side { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; }
        .login-info-side { flex: 1; background: linear-gradient(135deg, #A67C00 0%, #D4AF37 100%); color: white; padding: 60px; display: flex; flex-direction: column; justify-content: center; }
        
        .brand-estacion { font-family: 'Playfair Display', serif; color: #A67C00; font-size: 1.8rem; margin-bottom: 10px; font-weight: 700; }
        .login-form input { border-radius: 8px; padding: 12px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.1); }
        .btn-estacion-primario { background: linear-gradient(135deg, #A67C00 0%, #D4AF37 100%); color: white; border-radius: 8px; border: none; padding: 12px; font-weight: 600; width: 100%;}
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-form-side">
            <h1 class="brand-estacion"><i class="bi bi-gift icon-estacion"></i> La Estación</h1>
            <p class="text-muted mb-4">Ingresa tus credenciales para administrar detalles.</p>
            <form class="login-form" action="{{ url_for('login') }}" method="POST">
                <input type="email" name="email" class="form-control" placeholder="Email de usuario" required>
                <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                <button type="submit" class="btn-estacion-primario">Entrar con Perfil</button>
            </form>
            <p class="mt-4 text-center small text-muted">© 2026 Gestión Premium de Detalles</p>
        </div>
        <div class="login-info-side text-center">
            <i class="bi bi-gift icon-estacion mb-4" style="font-size: 5rem;"></i>
            <h2>Gestión de Inventario</h2>
            <p class="text-white-50 mt-3">Supervisa tu stock, genera reportes PDF y optimiza la venta de regalos especiales.</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
