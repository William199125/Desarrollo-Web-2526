<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Usuario - La Estación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark px-4 shadow-sm">
        <a class="navbar-brand" href="{{ url_for('panel') }}">
            <i class="bi bi-arrow-left"></i> Volver al Panel
        </a>
        <span class="text-white"><i class="bi bi-person-plus"></i> Nuevo Administrador</span>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white p-4 border-bottom text-center">
                        <h4 class="m-0 fw-bold" style="color: #A67C00 !important;">
                            <i class="bi bi-person-badge"></i> Registrar Nuevo Usuario
                        </h4>
                        <p class="text-muted small mt-2 m-0">Crea un nuevo acceso administrativo al sistema.</p>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        
                        <form action="{{ url_for('registro_usuario') }}" method="POST">
                            <div class="mb-4">
                                <label class="fw-bold text-muted mb-2">Nombre Completo</label>
                                <input type="text" name="nombre" class="form-control form-control-lg bg-light" placeholder="Ej: Diana Paucar" required>
                            </div>
                            <div class="mb-4">
                                <label class="fw-bold text-muted mb-2">Correo Electrónico</label>
                                <input type="email" name="email" class="form-control form-control-lg bg-light" placeholder="admin@laestacion.com" required>
                            </div>
                            <div class="mb-5">
                                <label class="fw-bold text-muted mb-2">Contraseña de Acceso</label>
                                <input type="password" name="password" class="form-control form-control-lg bg-light" placeholder="Escribe una contraseña segura" required>
                            </div>
                            
                            <div class="d-flex gap-3">
                                <a href="{{ url_for('panel') }}" class="btn btn-light border w-50 py-2 fw-bold text-muted">Cancelar</a>
                                <button type="submit" class="btn w-50 py-2 fw-bold text-white" style="background-color: #A67C00; border: none;">
                                    Crear Cuenta
                                </button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
