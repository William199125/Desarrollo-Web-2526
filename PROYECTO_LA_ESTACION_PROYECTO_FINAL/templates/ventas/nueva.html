<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Venta - La Estación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h2 class="fw-bold" style="color: #0d6efd;">Registrar Venta</h2>
            <a href="{{ url_for('panel') }}" class="btn btn-outline-secondary fw-bold">Volver al Panel</a>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} fw-bold">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <form action="{{ url_for('registrar_venta') }}" method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Seleccionar Cliente</label>
                        <select name="id_cliente" class="form-select bg-light" required>
                            <option value="">-- Elija un cliente --</option>
                            {% for c in clientes %}
                                <option value="{{ c.id_cliente }}">{{ c.nombre }} ({{ c.cedula }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Producto a Vender</label>
                        <select name="id_producto" class="form-select bg-light" required>
                            <option value="">-- Elija un producto --</option>
                            {% for p in productos %}
                                <option value="{{ p.id_producto }}">{{ p.nombre }} - Disp: {{ p.stock }} unid.</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Cantidad</label>
                        <input type="number" name="cantidad" class="form-control bg-light" min="1" required>
                    </div>
                    <button type="submit" class="btn w-100 fw-bold text-white" style="background-color: #B8860B;">Procesar Venta</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
