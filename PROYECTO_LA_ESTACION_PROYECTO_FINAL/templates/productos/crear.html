<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Detalle - La Estación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark px-4 shadow-sm">
        <a class="navbar-brand" href="{{ url_for('listar_productos') }}">
            <i class="bi bi-arrow-left"></i> Volver al Inventario
        </a>
        <span class="text-white"><i class="bi bi-plus-circle"></i> Nuevo Producto</span>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white p-4 border-bottom">
                        <h4 class="m-0 text-warning fw-bold" style="color: #A67C00 !important;">
                            <i class="bi bi-gift"></i> Registrar Nuevo Detalle
                        </h4>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        
                        <form action="{{ url_for('crear_producto') }}" method="POST">
                            <div class="mb-4">
                                <label class="fw-bold text-muted mb-2">Nombre del Detalle</label>
                                <input type="text" name="nombre" class="form-control form-control-lg bg-light" placeholder="Ej: Arreglo de Girasoles" required>
                            </div>
                            <div class="mb-4">
                                <label class="fw-bold text-muted mb-2">Descripción</label>
                                <textarea name="descripcion" class="form-control bg-light" rows="3" placeholder="Ingresa los detalles especiales del producto..."></textarea>
                            </div>
                            <div class="row mb-5">
                                <div class="col">
                                    <label class="fw-bold text-muted mb-2">Precio de Venta ($)</label>
                                    <input type="number" step="0.01" name="precio" class="form-control form-control-lg bg-light" placeholder="0.00" required>
                                </div>
                                <div class="col">
                                    <label class="fw-bold text-muted mb-2">Stock Inicial</label>
                                    <input type="number" name="stock" class="form-control form-control-lg bg-light" placeholder="0" required>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-3">
                                <a href="{{ url_for('listar_productos') }}" class="btn btn-light border w-50 py-2 fw-bold text-muted">Cancelar</a>
                                <button type="submit" class="btn w-50 py-2 fw-bold text-white" style="background-color: #A67C00; border: none;">
                                    Guardar Producto
                                </button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
