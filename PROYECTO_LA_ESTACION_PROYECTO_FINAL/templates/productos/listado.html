<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario - La Estación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark px-4 shadow-sm">
        <a class="navbar-brand" href="{{ url_for('panel') }}"><i class="bi bi-arrow-left"></i> Volver al Panel</a>
        <span class="text-white"><i class="bi bi-box-seam"></i> Inventario de Detalles</span>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gestión de Productos</h2>
            <a href="{{ url_for('crear_producto') }}" class="btn btn-warning fw-bold shadow-sm" style="background-color: #A67C00; color: white; border: none;">
                <i class="bi bi-plus-circle"></i> Nuevo Detalle
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover m-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Nombre del Producto</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in productos %}
                        <tr>
                            <td>{{ p.id_producto }}</td>
                            <td class="fw-bold">{{ p.nombre }}</td>
                            <td>${{ p.precio }}</td>
                            <td>
                                <span class="badge {{ 'bg-danger' if p.stock < 5 else 'bg-success' }}">{{ p.stock }}</span>
                            </td>
                            <td>
                                <div class="d-flex justify-content-center gap-2">
                                    <a href="{{ url_for('editar_producto', id=p.id_producto) }}" class="btn btn-sm btn-outline-warning">
                                        <i class="bi bi-pencil"></i> Editar
                                    </a>
                                    <form action="{{ url_for('eliminar_producto', id=p.id_producto) }}" method="POST" onsubmit="return confirm('¿Seguro que deseas eliminar este detalle?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i> Eliminar
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
