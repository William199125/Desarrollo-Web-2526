<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Detalle - La Estación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark px-4 shadow-sm">
        <a class="navbar-brand" href="{{ url_for('listar_productos') }}">
            <i class="bi bi-arrow-left"></i> Cancelar Edición
        </a>
        <span class="text-white"><i class="bi bi-pencil-square"></i> Actualizar Producto</span>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white p-4 border-bottom">
                        <h4 class="m-0 fw-bold" style="color: #A67C00 !important;">
                            <i class="bi bi-pencil"></i> Editar: {{ producto.nombre }}
                        </h4>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form action="{{ url_for('editar_producto', id=producto.id_producto) }}" method="POST">
                            <div class="mb-4">
                                <label class="fw-bold text-muted mb-2">Nombre del Detalle</label>
                                <input type="text" name="nombre" class="form-control form-control-lg bg-light" value="{{ producto.nombre }}" required>
                            </div>
                            <div class="mb-4">
                                <label class="fw-bold text-muted mb-2">Descripción</label>
                                <textarea name="descripcion" class="form-control bg-light" rows="3">{{ producto.descripcion }}</textarea>
                            </div>
                            <div class="row mb-5">
                                <div class="col">
                                    <label class="fw-bold text-muted mb-2">Precio de Venta ($)</label>
                                    <input type="number" step="0.01" name="precio" class="form-control form-control-lg bg-light" value="{{ producto.precio }}" required>
                                </div>
                                <div class="col">
                                    <label class="fw-bold text-muted mb-2">Stock Disponible</label>
                                    <input type="number" name="stock" class="form-control form-control-lg bg-light" value="{{ producto.stock }}" required>
                                </div>
                            </div>
                            <button type="submit" class="btn w-100 py-2 fw-bold text-white" style="background-color: #A67C00; border: none;">
                                Guardar Cambios
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
