{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Gestión de Inventario - La Estación</h2>
    
    <div class="card p-4 mb-4">
        <h4>Añadir Nuevo Producto</h4>
        <form action="/agregar" method="POST" class="row g-3">
            <div class="col-md-2"><input type="text" name="id" class="form-control" placeholder="ID" required></div>
            <div class="col-md-3"><input type="text" name="nombre" class="form-control" placeholder="Nombre" required></div>
            <div class="col-md-2"><input type="number" name="cantidad" class="form-control" placeholder="Cant." required></div>
            <div class="col-md-2"><input type="number" step="0.01" name="precio" class="form-control" placeholder="Precio" required></div>
            <div class="col-md-3"><button type="submit" class="btn btn-primary w-100">Guardar Producto</button></div>
        </form>
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.nombre }}</td>
                <td>{{ p.cantidad }}</td>
                <td>${{ p.precio }}</td>
                <td>
                    <a href="/eliminar/{{ p.id }}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
