<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión - La Estación</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Registro de Usuarios</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="alert alert-success">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card card-body mb-4">
        <form action="/agregar_usuario" method="POST">
            <div class="row">
                <div class="col"><input type="text" name="nombre" placeholder="Nombre" class="form-control" required></div>
                <div class="col"><input type="email" name="mail" placeholder="Email" class="form-control" required></div>
                <div class="col"><input type="password" name="password" placeholder="Contraseña" class="form-control" required></div>
                <div class="col"><button type="submit" class="btn btn-primary">Guardar</button></div>
            </div>
        </form>
    </div>

    <table class="table table-striped">
        <thead>
            <tr><th>Nombre</th><th>Email</th><th>Acciones</th></tr>
        </thead>
        <tbody>
            {% for u in usuarios %}
            <tr>
                <td>{{ u.nombre }}</td>
                <td>{{ u.mail }}</td>
                <td>
                    <a href="/eliminar_usuario/{{ u.id_usuario }}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
