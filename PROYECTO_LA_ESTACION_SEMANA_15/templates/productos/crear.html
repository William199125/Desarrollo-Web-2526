<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Producto - La Estación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo_estacion.css') }}">
</head>
<body>

    <header class="estacion-header mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand estacion-brand m-0" href="#">
                <i class="bi bi-gift icon-estacion"></i> La Estación de los Detalles
            </a>
            <nav>
                <a href="{{ url_for('panel') }}" class="nav-link-estacion">Inicio</a>
                <a href="{{ url_for('listar_productos') }}" class="nav-link-estacion active">Productos</a>
                <span class="ms-3 text-muted small">
                    <i class="bi bi-person-circle icon-estacion"></i> {{ current_user.nombre }}
                </span>
                <a href="{{ url_for('logout') }}" class="ms-3 btn btn-sm btn-estacion-secundario">Salir</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                {% with messages = get_flashed_messages() %}
                  {% if messages %}
                    {% for message in messages %}
                      <div class="alert alert-info alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <div class="card card-estacion shadow">
                    <div class="card-header card-header-estacion">
                        <i class="bi bi-tag"></i> Registrar Nuevo Detalle
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form action="{{ url_for('crear_producto') }}" method="POST">
                            <div class="mb-4">
                                <label class="label-estacion">Nombre del Detalle / Regalo</label>
                                <input type="text" name="nombre" class="form-control form-control-estacion" placeholder="Ej: Caja de Rosas Premium" required>
                            </div>
                            <div class="mb-4">
                                <label class="label-estacion">Pequeña Descripción</label>
                                <textarea name="descripcion" class="form-control form-control-estacion" rows="3" placeholder="Describe qué hace especial este producto..."></textarea>
                            </div>
                            <div class="row g-4">
                                <div class="col-md-6 mb-4">
                                    <label class="label-estacion">Precio de Venta ($)</label>
                                    <input type="number" step="0.01" name="precio" class="form-control form-control-estacion" placeholder="0.00" required>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="label-estacion">Stock Disponible</label>
                                    <input type="number" name="stock" class="form-control form-control-estacion" placeholder="0" required>
                                </div>
                            </div>
                            <div class="mt-4 text-end">
                                <a href="{{ url_for('listar_productos') }}" class="btn btn-estacion-secundario px-4 me-2">Cancelar</a>
                                <button type="submit" class="btn btn-estacion-primario px-5">Guardar Detalle</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
