<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - La Estación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 card p-4 shadow">
            <h2 class="text-center">Crear Cuenta</h2>
            <form method="POST">
                <div class="mb-3"><label>Nombre</label><input type="text" name="nombre" class="form-control" required></div>
                <div class="mb-3"><label>Email</label><input type="email" name="email" class="form-control" required></div>
                <div class="mb-3"><label>Contraseña</label><input type="password" name="password" class="form-control" required></div>
                <button type="submit" class="btn btn-success w-100">Registrar</button>
            </form>
            <p class="mt-3 text-center"><a href="/login">Regresar al Login</a></p>
        </div>
    </div>
</body>
</html>
