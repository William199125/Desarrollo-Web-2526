<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h3>Modificar Datos del Usuario</h3>
    <form action="/editar_usuario/{{ usuario.id_usuario }}" method="POST" class="card card-body">
        <div class="mb-3">
            <label>Nombre:</label>
            <input type="text" name="nombre" value="{{ usuario.nombre }}" class="form-control">
        </div>
        <div class="mb-3">
            <label>Email:</label>
            <input type="email" name="mail" value="{{ usuario.mail }}" class="form-control">
        </div>
        <div class="mb-3">
            <label>Password:</label>
            <input type="text" name="password" value="{{ usuario.password }}" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Guardar Cambios</button>
        <a href="/usuarios" class="btn btn-link">Cancelar</a>
    </form>
</body>
</html>
